name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: valutorres

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Frontend
        run: |
          cd front_despacho
          docker build -t ${{ env.DOCKER_USERNAME }}/frontend:${{ github.sha }} .
          docker push ${{ env.DOCKER_USERNAME }}/frontend:${{ github.sha }}

      - name: Build and push Backend Ventas
        run: |
          cd back-Ventas_SpringBoot/Springboot-API-REST
          docker build -t ${{ env.DOCKER_USERNAME }}/backend-ventas:${{ github.sha }} .
          docker push ${{ env.DOCKER_USERNAME }}/backend-ventas:${{ github.sha }}

      - name: Build and push Backend Despachos
        run: |
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker build -t ${{ env.DOCKER_USERNAME }}/backend-despachos:${{ github.sha }} .
          docker push ${{ env.DOCKER_USERNAME }}/backend-despachos:${{ github.sha }}
