name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:  

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 571440187930
  ECR_REPOSITORY_FRONTEND: proyectosemestral-frontend
  ECR_REPOSITORY_VENTAS: proyectosemestral-backend-ventas
  ECR_REPOSITORY_DESPACHOS: proyectosemestral-backend-despachos
  ECS_CLUSTER: proyecto-cluster
  ECS_SERVICE_VENTAS: ventas-service
  ECS_SERVICE_DESPACHOS: despachos-service
  ECS_SERVICE_FRONTEND: frontend-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Frontend to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG ./front_despacho
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG

    - name: Build and push Backend Ventas to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_VENTAS:$IMAGE_TAG ./back-Ventas_SpringBoot/Springboot-API-REST
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_VENTAS:$IMAGE_TAG

    - name: Build and push Backend Despachos to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_DESPACHOS:$IMAGE_TAG ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_DESPACHOS:$IMAGE_TAG

    - name: Update ECS services
      run: |
        aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_VENTAS --force-new-deployment
        aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_DESPACHOS --force-new-deployment
        aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_FRONTEND --force-new-deployment
